<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pierre & Elise ❤️</title>
    <style>
        body {
            background: linear-gradient(rgba(255, 229, 236, 0.3), rgba(255, 194, 209, 0.3)), url('photo_poupette.jpg.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; margin: 0;
        }
        .box {
            background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 40px 25px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.5);
            max-width: 400px; width: 90%; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }
        h1 { color: #ff4d6d; margin-bottom: 20px; }
        p { font-size: 1.2rem; font-style: italic; line-height: 1.6; color: #2b2b2b; }
        .btn-back {
            margin-top: 25px; background: linear-gradient(135deg, #ff4d6d, #ff758f); color: white;
            border: none; padding: 10px 25px; border-radius: 20px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Pierre & Elise ✨</h1>
        <p>Deux cœurs qui battent au même rythme, un code unique qui nous lie, et un avenir magnifique qu'on construit ensemble chaque jour. Tu es ma plus belle certitude. ❤️</p>
        <button class="btn-back" onclick="window.location.href='messagerie.html'">➔ Retour</button>
    </div>
</body>
</html>
