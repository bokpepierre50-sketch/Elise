<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Identification ❤️</title>
    <style>
        body { background: linear-gradient(rgba(255, 229, 236, 0.45), rgba(255, 194, 209, 0.45)); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 90%; max-width: 400px; }
        img { width: 100%; border-radius: 15px; margin-bottom: 15px; }
        button { background: #ff4d6d; color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        #quiz-zone { display: none; margin-top: 15px; }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 2px solid #ff8fab; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Coucou toi ! ❤️</h2>
        <!-- Remplace 'fond.jpg' par le nom exact de ton image -->
        <img src="image.png" alt="Ma Poupette">
        
        <button id="btn-start" onclick="document.getElementById('quiz-zone').style.display='block'; this.style.display='none';">IDENTIFIEZ-VOUS 🔐</button>
        
        <div id="quiz-zone">
            <p>Quel est la chose que il aime manger souvent et toi tu n'aime pas ?</p>
            <input type="text" id="reponse" placeholder="Réponse...">
            <br>
            <button onclick="verifier()">Valider</button>
            <p id="error" style="color:red;"></p>
        </div>
    </div>

    <script>
        function verifier() {
            let r = document.getElementById('reponse').value.trim().toLowerCase();
            if (r === "aborbor") {
                // Ici, on l'envoie vers ton ancien fichier qui s'appelle maintenant cadeau.html
                window.location.href = "cadeau.html"; 
            } else {
                document.getElementById('error').innerText = "Erreur !";
            }
        }
    </script>
</body>
</html>
