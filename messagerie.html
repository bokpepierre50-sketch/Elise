<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Two of Us ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* On garde la photo de ta poupette en fond pour une parfaite continuité */
            background: linear-gradient(rgba(255, 229, 236, 0.3), rgba(255, 194, 209, 0.3)), 
                        url('photo_poupette.jpg.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            text-align: center;
        }
        .btn-back-top {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(255, 255, 255, 0.6);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    color: #ff4d6d;
    padding: 8px 14px;
    font-size: 1rem;
    font-weight: bold;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    transition: all 0.3s ease;
    z-index: 10;
    text-decoration: none;
    display: inline-block;
}
.btn-back-top:hover {
    background: #ff4d6d;
    color: white;
    transform: scale(1.1);
}

        .container {
            width: 90%;
            max-width: 450px;
            padding: 20px;
            z-index: 2;
        }

        /* --- LE PANNEAU DE MESSAGERIE --- */
        .menu-box {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px 25px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            animation: slideUp 0.6s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .main-title {
            color: #ff4d6d;
            font-size: 2.4rem;
            margin-bottom: 35px;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 1px 1px 4px rgba(255, 255, 255, 0.6);
        }

        /* --- STYLE ALIGNÉ DES BOUTONS (OPTIONS) --- */
        .menu-options {
            display: flex;
            flex-direction: column;
            gap: 20px; /* Espace entre les boutons */
            margin-bottom: 20px;
        }

        .btn-option {
            background: rgba(255, 255, 255, 0.7);
            color: #ff4d6d;
            border: 1px solid rgba(255, 77, 109, 0.3);
            padding: 16px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: flex-start; /* Aligne le contenu à gauche */
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        /* La flèche devant l'option */
        .btn-option::before {
            content: "➔";
            margin-right: 15px;
            font-size: 1.3rem;
            transition: transform 0.3s ease;
            color: #ff758f;
        }

        /* Effets au survol */
        .btn-option:hover {
            background: linear-gradient(135deg, #ff4d6d, #ff758f);
            color: white;
            transform: scale(1.03);
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.3);
        }

        .btn-option:hover::before {
            color: white;
            transform: translateX(5px); /* La flèche avance un peu */
        }

        /* --- ZONE D'AFFICHAGE DES INFOS --- */
        #info-display {
            margin-top: 25px;
            padding: 15px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.5);
            color: #2b2b2b;
            font-size: 1.1rem;
            font-style: italic;
            display: none; /* Caché au début */
            animation: fadeIn 0.4s ease forwards;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
<a href="cadeau.html" class="btn-back-top" style="text-align: center; display: flex; align-items: center; justify-content: center;">⬅</a>
    <div class="container">
        <div class="menu-box">
            <h1 class="main-title">The Two of Us ✨</h1>
            
            <div class="menu-options">
                <button class="btn-option" onclick="actionOption('couple')">Pierre & Elise</button>
                <button class="btn-option" onclick="actionOption('texte')">Texte</button>
                <button class="btn-option" onclick="actionOption('album')">Album</button>
            </div>

            <div id="info-display"></div>
        </div>
    </div>

    <script>
          <!-- Supprime la div #info-display si tu veux, elle n'est plus nécessaire -->

        function actionOption(type) {
            if (type === 'couple') {
                window.location.href = 'couple.html';
            } 
            else if (type === 'texte') {
                window.location.href = 'texte.html';
            } 
            else if (type === 'album') {
                window.location.href = 'album.html';
            }
        }
    </script>
</body>
</html>
