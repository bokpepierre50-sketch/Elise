<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ton Album Privé 📸</title>
    <style>
        body {
            background: linear-gradient(rgba(255, 229, 236, 0.3), rgba(255, 194, 209, 0.3)), url('photo_poupette.jpg.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px 0;
        }
        .box {
            background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 30px 20px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.5);
            max-width: 450px; width: 90%; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15); text-align: center;
        }
        h1 { color: #ff4d6d; margin-bottom: 5px; }
        .gallery {
            display: flex; flex-direction: column; gap: 20px; margin-top: 20px; 
            max-height: 450px; overflow-y: auto; padding-right: 5px;
        }
        .media-card { background: white; padding: 6px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .media-card img, .media-card video { width: 100%; border-radius: 8px; display: block; }
        .btn-back {
            background: linear-gradient(135deg, #ff4d6d, #ff758f); color: white;
            border: none; padding: 10px 25px; border-radius: 20px; font-weight: bold; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Ton Album Privé 📸</h1>
        <p style="font-size: 0.9rem; color: #555; font-style: italic; margin: 0;">Je n'ai pas puis faire grande chose...</p>
        
        <div class="gallery">
            <!-- PHOTO 1 -->
            <div class="media-card"><img src="photo1.jpg.png" alt="Souvenir"></div>
            <!-- PHOTO 2 -->
            <div class="media-card"><img src="photo2.jpg.png" alt="Moment magique"></div>
            <!-- PHOTO 3 -->
            <div class="media-card"><img src="photo3.jpg.png" alt="Sourire"></div>
            <!-- PHOTO 4 -->
            <div class="media-card"><img src="photo4.png.jpg" alt="Sourire"></div>
            <!-- PHOTO 5 -->
            <div class="media-card"><img src="photo5.png.jpg" alt="Sourire"></div>
            <!-- PHOTO 6 -->
            <div class="media-card"><img src="photo6.png" alt="Elle même"></div>
            <!-- PHOTO 7 -->
            <div class="media-card"><img src="photo7.png" alt="Nous"></div>
            <!-- PHOTO 8 -->
            <div class="media-card"><img src="photo8.png" alt="Nous"></div>
            <!-- PHOTO 9 -->
            <div class="media-card"><img src="photo9.jpeg" alt="Moi"></div>

            <!-- VIDÉO 1 -->
            <div class="media-card">
                <p style="font-size: 0.9rem; font-weight: bold; color: #ff4d6d; margin-bottom: 6px; margin-top: 0;">Un souvenir précieux... 🎥</p>
                <video controls><source src="video1.mp4.mp4" type="video/mp4"></video>
            </div>
            <!-- VIDÉO 2 -->
            <div class="media-card">
                <p style="font-size: 0.9rem; font-weight: bold; color: #ff4d6d; margin-bottom: 6px; margin-top: 0;">Un souvenir précieux... 🎥</p>
                <video controls><source src="video2.mp4.mp4" type="video/mp4"></video>
            </div>
            <!-- VIDÉO 3 -->
            <div class="media-card">
                <p style="font-size: 0.9rem; font-weight: bold; color: #ff4d6d; margin-bottom: 6px; margin-top: 0;">Un souvenir précieux... 🎥</p>
                <video controls><source src="video3.mp4.mp4" type="video/mp4"></video>
            </div>
        </div>

        <button class="btn-back" onclick="window.location.href='messagerie.html'">➔ Retour</button>
    </div>
</body>
</html>
